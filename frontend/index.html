<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Drive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
</head>

<body class="bg-light">

  <div class="container py-4">
    <h3 class="mb-4"><i class="bi bi-cloud-fill text-primary"></i> Cloud Drive</h3>

    <!-- Upload Section -->
    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title mb-3">Upload File</h5>
        <form id="upload-form">
          <div class="mb-2">
            <input type="file" class="form-control" id="file-input" />
          </div>
          <div class="mb-2">
            <input type="text" class="form-control" id="description-input" placeholder="Description (optional)" />
          </div>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-upload"></i> Upload
          </button>
        </form>
      </div>
    </div>

    <!-- File List Section -->
    <div class="card">
      <div class="card-body">
        <h5 class="card-title mb-3">Files</h5>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Name</th>
                <th>Size</th>
                <th>Description</th>
                <th>Uploaded</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="file-list"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
